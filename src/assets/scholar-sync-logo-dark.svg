<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="100%" height="100%">
  <defs>
    <!-- Import Premium Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&amp;display=swap');
      .logo-text-scholar {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-weight: 800;
        font-size: 32px;
        fill: #FFFFFF;
      }
      .logo-text-sync {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-weight: 500;
        font-size: 32px;
        fill: url(#syncGrad);
      }
    </style>

    <!-- Gradients -->
    <linearGradient id="iconGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="60%" stop-color="#E2E8F0" />
      <stop offset="100%" stop-color="#CBD5E1" />
    </linearGradient>

    <linearGradient id="syncGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#0EA5E9" />
    </linearGradient>

    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#0EA5E9" />
    </linearGradient>
    
    <!-- Glow Effect for Dark Mode Premium Feel -->
    <filter id="glowEffect" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Group for Logo Icon -->
  <g transform="translate(10, 10)">
    <!-- Outer Sync Orbit Arc (Glows in dark mode) -->
    <path d="M 62 18 A 28 28 0 0 1 50 68" fill="none" stroke="url(#syncGrad)" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="1 8 20 20" filter="url(#glowEffect)" opacity="0.8" />
    <path d="M 8 42 A 28 28 0 0 1 20 12" fill="none" stroke="url(#syncGrad)" stroke-width="4.5" stroke-linecap="round" />

    <!-- Mortarboard Diamond (Academic Symbol) -->
    <!-- Left Cap Facet -->
    <path d="M 35 15 L 10 27 L 35 39 L 35 15 Z" fill="url(#iconGradDark)" />
    <!-- Right Cap Facet (Slightly darker for folding 3D depth) -->
    <path d="M 35 15 L 60 27 L 35 39 L 35 15 Z" fill="#94A3B8" opacity="0.85" />

    <!-- Cap Base -->
    <path d="M 20 34.5 C 20 44 26 47 35 47 C 44 47 50 44 50 34.5 C 45 38 39 39 35 39 C 31 39 25 38 20 34.5 Z" fill="url(#iconGradDark)" />

    <!-- The Tassel Node (Vibrant Cyan connection point) -->
    <!-- Tassel String -->
    <path d="M 35 27 L 55 37 L 55 49" fill="none" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Tassel End/Sync Connection Node -->
    <circle cx="55" cy="52" r="4.5" fill="url(#accentGrad)" />
    <circle cx="55" cy="52" r="8" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.5" />
  </g>

  <!-- Typography Alignment -->
  <!-- "Scholar" (Bold White) -->
  <text x="82" y="49" class="logo-text-scholar">Scholar</text>
  <!-- "Sync" (Medium-Bold Tech Cyan Gradient) -->
  <text x="202" y="49" class="logo-text-sync">Sync</text>
</svg>
